name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Build
        env:
          # Repo subpath for GitHub Pages.
          # User/org sites (<name>.github.io) serve at "/", project sites serve at "/<repo>/".
          # Set in the "Build base path" step below.
          VITE_SUPABASE_URL: ${{ vars.VITE_SUPABASE_URL || 'https://amalcupitavetzuyazrf.supabase.co' }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ vars.VITE_SUPABASE_PUBLISHABLE_KEY || 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFtYWxjdXBpdGF2ZXR6dXlhenJmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc0ODk5NzcsImV4cCI6MjA5MzA2NTk3N30.RyhZEBqUTIINfaVs_V0GT52eJzdo-07UpUIXQ-i4r7A' }}
          VITE_SUPABASE_PROJECT_ID: ${{ vars.VITE_SUPABASE_PROJECT_ID || 'amalcupitavetzuyazrf' }}
        run: |
          REPO_NAME="${{ github.event.repository.name }}"
          OWNER="${{ github.repository_owner }}"
          if [[ "$REPO_NAME" == "$OWNER.github.io" ]]; then
            export VITE_BASE="/"
          else
            export VITE_BASE="/$REPO_NAME/"
          fi
          echo "Using VITE_BASE=$VITE_BASE"
          npm run build

      - name: Add SPA fallback & .nojekyll
        run: |
          cp dist/index.html dist/404.html
          touch dist/.nojekyll

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "./dist"

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
        id: deployment